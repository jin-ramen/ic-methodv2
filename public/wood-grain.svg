<svg xmlns="http://www.w3.org/2000/svg" width="400" height="800">
  <defs>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015 0.003" numOctaves="6" seed="2" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="mono"/>
      <feComponentTransfer in="mono" result="stretched">
        <feFuncR type="linear" slope="0.6" intercept="0.35"/>
        <feFuncG type="linear" slope="0.6" intercept="0.35"/>
        <feFuncB type="linear" slope="0.6" intercept="0.35"/>
      </feComponentTransfer>
    </filter>
    <!-- warm wood tint overlay -->
    <linearGradient id="tint" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4a882" stop-opacity="0.45"/>
      <stop offset="25%" stop-color="#b89b72" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#c9ad88" stop-opacity="0.4"/>
      <stop offset="75%" stop-color="#b5966e" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c4a882" stop-opacity="0.45"/>
    </linearGradient>
    <!-- subtle horizontal grain lines -->
    <pattern id="lines" x="0" y="0" width="400" height="12" patternUnits="userSpaceOnUse">
      <line x1="0" y1="2" x2="400" y2="2.5" stroke="#a08060" stroke-width="0.3" opacity="0.15"/>
      <line x1="0" y1="5" x2="400" y2="4.8" stroke="#8b6b4a" stroke-width="0.2" opacity="0.1"/>
      <line x1="0" y1="9" x2="400" y2="9.3" stroke="#a08060" stroke-width="0.25" opacity="0.12"/>
    </pattern>
    <!-- wider grain bands -->
    <pattern id="bands" x="0" y="0" width="400" height="80" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="400" height="80" fill="none"/>
      <line x1="0" y1="15" x2="400" y2="16" stroke="#9a7b5a" stroke-width="0.8" opacity="0.08"/>
      <line x1="0" y1="40" x2="400" y2="39" stroke="#8b6b4a" stroke-width="1" opacity="0.06"/>
      <line x1="0" y1="65" x2="400" y2="66" stroke="#9a7b5a" stroke-width="0.6" opacity="0.07"/>
    </pattern>
    <!-- knot accent -->
    <radialGradient id="knot" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#8b6b4a" stop-opacity="0.08"/>
      <stop offset="60%" stop-color="#a08060" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#a08060" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- base light wood color -->
  <rect width="400" height="800" fill="#e3ddcf"/>

  <!-- fractal noise grain texture -->
  <rect width="400" height="800" filter="url(#grain)" opacity="0.35"/>

  <!-- warm wood tint -->
  <rect width="400" height="800" fill="url(#tint)"/>

  <!-- fine grain lines -->
  <rect width="400" height="800" fill="url(#lines)"/>

  <!-- broader grain bands -->
  <rect width="400" height="800" fill="url(#bands)"/>

  <!-- subtle knot details -->
  <ellipse cx="120" cy="200" rx="35" ry="18" fill="url(#knot)"/>
  <ellipse cx="300" cy="520" rx="28" ry="14" fill="url(#knot)"/>
  <ellipse cx="80" cy="680" rx="22" ry="12" fill="url(#knot)"/>
</svg>
