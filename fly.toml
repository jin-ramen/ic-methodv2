app = 'ic-methodv2'
primary_region = 'syd'

[deploy]
  release_command = "python -m alembic upgrade head"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
